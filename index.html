<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: rgb(3, 141, 141);
            
        }
        .container{
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            
        }
        .inner-box{
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffff;
            letter-spacing: 4px;
            width: 700px;
            height: 400px;
            margin-top: 100px;
            flex-direction: column;
            background-color: #ffffff2d;
            border-radius: 20px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.9);
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }
        .inner-box h1{
            font-size: 4rem;
            color: #060123;
        }
        .inner-box h3{
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="inner-box">
            <h1>Hello,</h1>
            <h2>We are working on...</h2>
            <h3>Will come soon</h3>
        </div>
    </div>
</body>
</html>
